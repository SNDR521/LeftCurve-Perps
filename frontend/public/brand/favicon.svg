<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeftCurve">
  <defs>
    <linearGradient id="lc-tile" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1f25"/>
      <stop offset="1" stop-color="#111316"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="63" height="63" rx="14" fill="url(#lc-tile)" stroke="#2a2c30"/>
  <!-- baseline / x-axis -->
  <line x1="12" y1="46" x2="52" y2="46" stroke="#2f333a" stroke-width="2" stroke-linecap="round"/>
  <!-- bell curve: right (descending) slope faded -->
  <path d="M32 16 C 40 16 42 46 52 46" stroke="#38bdf8" stroke-opacity="0.30" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bell curve: LEFT (rising) slope — the hero -->
  <path d="M12 46 C 22 46 24 16 32 16" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- peak marker -->
  <circle cx="32" cy="16" r="2.6" fill="#38bdf8"/>
</svg>
